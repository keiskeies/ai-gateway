name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install tauri-cli
        run: cargo install tauri-cli

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Gateway ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download the installer for your platform.

            ## What's New in v1.2.0

            - 🎯 **Remote model fetching**: Automatically fetch available models from platform APIs when configuring backends — select from dropdown, no manual input needed
            - 🧠 **Smart capability detection**: Model capabilities (chat/code/vision/function calling) auto-filled from presets, with manual override support
            - 🔄 **reasoning_content support**: Compatible with chain-of-thought content from NVIDIA NIM and similar platforms, auto-forwarded in responses
            - 🗑️ **Simplified UI**: Removed standalone Models page — backend model configuration now integrated directly into Virtual Models
            - 🏷️ **Platform name in backends**: Backend model tags now show platform name prefix (e.g., "OpenAI·gpt-4o") for clearer identification
            - 🔧 **DB migration V5**: Backend model_id now stores actual model string instead of UUID foreign key
            - ❌ **Removed auto-sync**: Removed the problematic auto-sync/manual-sync feature that could incorrectly delete backends — remote model fetching in Virtual Models replaces this entirely

            ## Existing Features
            - Dual-protocol native support: OpenAI & Anthropic Messages API
            - Google Gemini platform preset
            - Settings page with configurable admin port
            - 15+ built-in platform presets
            - 5 load balancing strategies
            - Dark/Light/System theme
            - Chinese/English i18n
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
