name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Install tauri-cli
        run: cargo install tauri-cli

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: cargo tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'AI Gateway ${{ github.ref_name }}'
          releaseBody: |
            See the assets below to download the installer for your platform.

            ## What's New in v1.2.3

            - 🎨 **UI redesign**: Complete frontend redesign with modern design system, consistent dark/light themes, and polished card components
            - 🏗️ **Layout improvements**: Aligned header with content, responsive navigation with labels, proper spacing and min-width constraints
            - 🌗 **Theme consistency**: Fixed background color flashing, unified border colors, proper dark mode support across all components
            - 📱 **Responsive design**: Better mobile support with collapsible navigation and adaptive layouts

            ## Existing Features
            - Dual-protocol native support: OpenAI & Anthropic Messages API
            - Google Gemini platform preset
            - Settings page with configurable admin port
            - 15+ built-in platform presets
            - 5 load balancing strategies
            - Dark/Light/System theme
            - Chinese/English i18n
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
